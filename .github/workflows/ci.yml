name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # Fail if supabase_setup.sql was hand-edited instead of regenerated from
      # the migrations (npm run build:schema).
      - run: npm run check:schema
      - run: npm test
      # Build needs the public Supabase vars present (not real) so pages can
      # prerender. Real keys are only needed at runtime.
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

  # The row-level-security tests are the security proof, so they gate merges too.
  # They need a real Postgres + GoTrue (they create signed-in users), so spin up
  # the full local Supabase stack rather than just a Postgres service container.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Starts the Dockerized stack and applies supabase/migrations to it. The
      # test helpers read the local URL + keys from `supabase status` at runtime.
      - run: npx supabase start
      - run: npm run test:integration
      - if: always()
        run: npx supabase stop
